<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lecture Live</title>
  <!-- marked.js for Markdown rendering -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <!-- KaTeX for LaTeX math rendering -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" crossorigin="anonymous" />
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1a1d27;
      border-bottom: 1px solid #2d3148;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 { font-size: 1.1rem; font-weight: 600; color: #a5b4fc; }

    #status-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #ef4444;
      transition: background 0.3s;
      flex-shrink: 0;
    }
    #status-dot.live { background: #22c55e; animation: pulse 2s infinite; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    #status-label { font-size: 0.8rem; color: #6b7280; }

    main {
      display: flex;
      flex: 1;
      overflow: hidden;
      gap: 0;
    }

    /* ---- Left panel: whiteboard notes ---- */
    #notes-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #2d3148;
      overflow: hidden;
    }

    /* ---- Right panel: transcript ---- */
    #transcript-panel {
      width: 340px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-header {
      background: #1a1d27;
      padding: 10px 16px;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #6366f1;
      border-bottom: 1px solid #2d3148;
      flex-shrink: 0;
    }

    .panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }

    /* Markdown content */
    #notes-content h1, #notes-content h2, #notes-content h3 {
      color: #a5b4fc;
      margin: 1em 0 0.4em;
    }
    #notes-content h2 { font-size: 1.15rem; border-bottom: 1px solid #2d3148; padding-bottom: 4px; }
    #notes-content p  { line-height: 1.65; margin: 0.5em 0; color: #cbd5e1; }
    #notes-content ul, #notes-content ol { margin: 0.4em 0 0.4em 1.4em; color: #cbd5e1; }
    #notes-content li { margin: 0.2em 0; line-height: 1.6; }
    #notes-content code {
      background: #1e2235;
      border: 1px solid #2d3148;
      border-radius: 4px;
      padding: 0 5px;
      font-family: "Fira Code", monospace;
      font-size: 0.88em;
      color: #93c5fd;
    }
    #notes-content pre {
      background: #1e2235;
      border: 1px solid #2d3148;
      border-radius: 8px;
      padding: 14px;
      overflow-x: auto;
      margin: 0.8em 0;
    }
    #notes-content pre code { background: none; border: none; padding: 0; }
    #notes-content blockquote {
      border-left: 3px solid #6366f1;
      margin: 0.6em 0;
      padding: 4px 12px;
      color: #94a3b8;
    }
    /* KaTeX display-mode math blocks */
    #notes-content .katex-display {
      margin: 0.8em 0;
      overflow-x: auto;
      overflow-y: hidden;
    }

    /* CSS grid that mirrors the whiteboard's 2D layout.
       3 equal columns match the left / center / right thirds of the board.
       Each cell is placed with grid-row and grid-column set from the JSON. */
    .whiteboard-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px 20px;        /* row-gap col-gap */
      align-items: start;    /* cells don't stretch to fill row height */
      width: 100%;
    }

    /* Each grid cell gets a subtle border so the spatial zones are visible. */
    .grid-cell {
      min-width: 0;          /* prevents grid blowout from long equations */
      padding: 6px 8px;
      border-radius: 6px;
      border: 1px solid #1e2235;
      background: #0f1117;
    }
    .grid-cell:empty { display: none; }

    #empty-notes {
      color: #4b5563;
      font-style: italic;
      font-size: 0.95rem;
      text-align: center;
      margin-top: 60px;
    }

    /* Transcript */
    #transcript-content {
      font-size: 0.9rem;
      line-height: 1.7;
      color: #94a3b8;
    }

    .transcript-segment {
      border-left: 2px solid #374151;
      padding: 6px 10px;
      margin-bottom: 8px;
      border-radius: 0 6px 6px 0;
      background: #12151f;
      transition: border-color 0.4s;
    }
    .transcript-segment.new {
      border-color: #6366f1;
      background: #1a1d2e;
    }

    #empty-transcript {
      color: #4b5563;
      font-style: italic;
      font-size: 0.85rem;
      text-align: center;
      margin-top: 40px;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2d3148; border-radius: 3px; }

    /* Responsive: stack panels on small screens */
    @media (max-width: 640px) {
      main { flex-direction: column; }
      #transcript-panel { width: 100%; border-top: 1px solid #2d3148; }
      #notes-panel { border-right: none; }
    }
  </style>
</head>
<body>

<header>
  <div style="display: flex; align-items: center; gap: 12px; flex: 1;">
    <div id="status-dot"></div>
    <h1>Lecture Live</h1>
    <span id="status-label">Connecting…</span>
  </div>
  <nav style="display: flex; gap: 24px; align-items: center;">
    <a href="/" style="color: #a5b4fc; text-decoration: none; font-weight: 600; border-bottom: 2px solid #6366f1; padding-bottom: 4px;">Lecture Mode</a>
    <a href="/canvas" style="color: #94a3b8; text-decoration: none; font-weight: 500; transition: color 0.2s;" onmouseover="this.style.color='#a5b4fc'" onmouseout="this.style.color='#94a3b8'">Canvas Mode</a>
  </nav>
</header>

<main>
  <!-- Whiteboard notes -->
  <section id="notes-panel">
    <div class="panel-header">Whiteboard Notes</div>
    <div class="panel-body" id="notes-body">
      <div id="notes-content"></div>
      <p id="empty-notes">Waiting for whiteboard content…</p>
    </div>
  </section>

  <!-- Live transcript -->
  <section id="transcript-panel">
    <div class="panel-header">Live Transcript</div>
    <div class="panel-body" id="transcript-body">
      <div id="transcript-content"></div>
      <p id="empty-transcript">Waiting for audio…</p>
    </div>
  </section>
</main>

<script>
  // ---- DOM refs ----
  const statusDot   = document.getElementById('status-dot');
  const statusLabel = document.getElementById('status-label');
  const notesContent    = document.getElementById('notes-content');
  const emptyNotes      = document.getElementById('empty-notes');
  const transcriptContent = document.getElementById('transcript-content');
  const emptyTranscript   = document.getElementById('empty-transcript');
  const notesBody       = document.getElementById('notes-body');
  const transcriptBody  = document.getElementById('transcript-body');

  // ---- WebSocket ----
  const WS_URL = `ws://${location.host}/ws`;
  let socket;
  let reconnectDelay = 2000;

  function connect() {
    socket = new WebSocket(WS_URL);

    socket.addEventListener('open', () => {
      statusDot.classList.add('live');
      statusLabel.textContent = 'Live';
      reconnectDelay = 2000;
    });

    socket.addEventListener('close', () => {
      statusDot.classList.remove('live');
      statusLabel.textContent = `Reconnecting in ${reconnectDelay / 1000}s…`;
      setTimeout(connect, reconnectDelay);
      reconnectDelay = Math.min(reconnectDelay * 1.5, 15000);
    });

    socket.addEventListener('error', () => {
      socket.close();
    });

    socket.addEventListener('message', (event) => {
      let msg;
      try { msg = JSON.parse(event.data); } catch { return; }

      if (msg.type === 'whiteboard') {
        handleWhiteboard(msg);
      } else if (msg.type === 'transcript') {
        handleTranscript(msg);
      }
    });
  }

  // ---- Math protection helpers ----
  // marked.js runs BEFORE KaTeX and mangles LaTeX in two ways:
  //   1. \\ (matrix row separator) → \ — rows collapse
  //   2. | characters → Markdown table syntax — matrices become lists
  //
  // Fix: extract all math blocks BEFORE marked.parse(), replace with placeholders,
  // let marked do its Markdown work, then restore the original LaTeX for KaTeX.

  function extractMath(md) {
    const blocks = [];
    // $$...$$ first so we don't split $$ into two separate $ matches.
    md = md.replace(/\$\$([\s\S]+?)\$\$/g, (_, math) => {
      blocks.push({ display: true, math });
      return `MATHPLACEHOLDER${blocks.length - 1}END`;
    });
    // $...$ — [^\n$]+ prevents crossing line boundaries.
    md = md.replace(/\$([^\n$]+?)\$/g, (_, math) => {
      blocks.push({ display: false, math });
      return `MATHPLACEHOLDER${blocks.length - 1}END`;
    });
    return { safeMd: md, blocks };
  }

  function restoreMath(html, blocks) {
    return html.replace(/MATHPLACEHOLDER(\d+)END/g, (_, i) => {
      const { display, math } = blocks[Number(i)];
      return display ? `$$${math}$$` : `$${math}$`;
    });
  }

  // Render a Markdown+LaTeX string into a DOM element (used for each grid cell).
  function renderContent(el, md) {
    const { safeMd, blocks } = extractMath(md);
    el.innerHTML = restoreMath(marked.parse(safeMd), blocks);
    renderMathInElement(el, {
      delimiters: [
        { left: '$$', right: '$$', display: true  },
        { left: '$',  right: '$',  display: false }
      ],
      throwOnError: false
    });
  }

  // ---- Whiteboard handler ----
  function handleWhiteboard({ full, delta }) {
    if (!full && !delta) return;
    const raw = full || delta;

    // Try to parse as the JSON grid format produced by ai.py.
    // If it fails (empty string, old format, etc.) nothing is rendered —
    // the panel just keeps its previous state.
    let parsed;
    try {
      parsed = JSON.parse(raw);
    } catch {
      return;
    }

    const cells = parsed.cells;
    if (!Array.isArray(cells)) return;

    // Hide the "Waiting…" placeholder once we have real content.
    emptyNotes.style.display = 'none';

    // Build a fresh CSS grid and populate it with cells from the JSON.
    // We rebuild the whole grid on every update — it's fast enough and
    // avoids the complexity of diffing the previous DOM state.
    const grid = document.createElement('div');
    grid.className = 'whiteboard-grid';

    cells.forEach(({ row, col, colSpan = 1, content }) => {
      const cell = document.createElement('div');
      cell.className = 'grid-cell';

      // CSS grid placement: grid-row and grid-column tell the browser exactly
      // which cell this content belongs in. "span N" means it stretches across
      // N column tracks, letting wide content (like a title) fill the full width.
      cell.style.gridRow    = row;
      cell.style.gridColumn = `${col} / span ${colSpan}`;

      // Render Markdown+LaTeX content inside the cell using our existing pipeline.
      renderContent(cell, content || '');
      grid.appendChild(cell);
    });

    // Replace previous grid with the new one.
    notesContent.innerHTML = '';
    notesContent.appendChild(grid);

    notesBody.scrollTop = notesBody.scrollHeight;
  }

  // ---- Transcript handler ----
  function handleTranscript({ full, delta }) {
    if (!full && !delta) return;

    // If we receive the full transcript on connect, render all at once
    if (full && !delta) {
      transcriptContent.innerHTML = '';
      if (full.trim()) {
        appendSegment(full, false);
        emptyTranscript.style.display = 'none';
      }
      return;
    }

    // Incremental delta
    if (delta && delta.trim()) {
      appendSegment(delta, true);
      emptyTranscript.style.display = 'none';
      transcriptBody.scrollTop = transcriptBody.scrollHeight;
    }
  }

  function appendSegment(text, isNew) {
    const div = document.createElement('div');
    div.className = 'transcript-segment' + (isNew ? ' new' : '');
    div.textContent = text;
    transcriptContent.appendChild(div);
    // Remove "new" highlight after a moment
    if (isNew) {
      setTimeout(() => div.classList.remove('new'), 3000);
    }
  }

  // ---- Keepalive ping every 20s ----
  setInterval(() => {
    if (socket && socket.readyState === WebSocket.OPEN) {
      socket.send('ping');
    }
  }, 20000);

  // ---- Start ----
  connect();
</script>

</body>
</html>
