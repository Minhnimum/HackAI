<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lecture Live</title>
  <!-- marked.js for Markdown rendering -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <!-- KaTeX for LaTeX math rendering -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" crossorigin="anonymous" />
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1a1d27;
      border-bottom: 1px solid #2d3148;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 { font-size: 1.1rem; font-weight: 600; color: #a5b4fc; }

    #status-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #ef4444;
      transition: background 0.3s;
      flex-shrink: 0;
    }
    #status-dot.live { background: #22c55e; animation: pulse 2s infinite; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    #status-label { font-size: 0.8rem; color: #6b7280; }

    main {
      display: flex;
      flex: 1;
      overflow: hidden;
      gap: 0;
    }

    /* ---- Left panel: whiteboard notes ---- */
    #notes-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #2d3148;
      overflow: hidden;
    }

    /* ---- Right panel: transcript ---- */
    #transcript-panel {
      width: 340px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-header {
      background: #1a1d27;
      padding: 10px 16px;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #6366f1;
      border-bottom: 1px solid #2d3148;
      flex-shrink: 0;
    }

    .panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }

    /* Markdown content */
    #notes-content h1, #notes-content h2, #notes-content h3 {
      color: #a5b4fc;
      margin: 1em 0 0.4em;
    }
    #notes-content h2 { font-size: 1.15rem; border-bottom: 1px solid #2d3148; padding-bottom: 4px; }
    #notes-content p  { line-height: 1.65; margin: 0.5em 0; color: #cbd5e1; }
    #notes-content ul, #notes-content ol { margin: 0.4em 0 0.4em 1.4em; color: #cbd5e1; }
    #notes-content li { margin: 0.2em 0; line-height: 1.6; }
    #notes-content code {
      background: #1e2235;
      border: 1px solid #2d3148;
      border-radius: 4px;
      padding: 0 5px;
      font-family: "Fira Code", monospace;
      font-size: 0.88em;
      color: #93c5fd;
    }
    #notes-content pre {
      background: #1e2235;
      border: 1px solid #2d3148;
      border-radius: 8px;
      padding: 14px;
      overflow-x: auto;
      margin: 0.8em 0;
    }
    #notes-content pre code { background: none; border: none; padding: 0; }
    #notes-content blockquote {
      border-left: 3px solid #6366f1;
      margin: 0.6em 0;
      padding: 4px 12px;
      color: #94a3b8;
    }
    /* KaTeX display-mode math blocks */
    #notes-content .katex-display {
      margin: 0.8em 0;
      overflow-x: auto;
      overflow-y: hidden;
    }

    #empty-notes {
      color: #4b5563;
      font-style: italic;
      font-size: 0.95rem;
      text-align: center;
      margin-top: 60px;
    }

    /* Transcript */
    #transcript-content {
      font-size: 0.9rem;
      line-height: 1.7;
      color: #94a3b8;
    }

    .transcript-segment {
      border-left: 2px solid #374151;
      padding: 6px 10px;
      margin-bottom: 8px;
      border-radius: 0 6px 6px 0;
      background: #12151f;
      transition: border-color 0.4s;
    }
    .transcript-segment.new {
      border-color: #6366f1;
      background: #1a1d2e;
    }

    #empty-transcript {
      color: #4b5563;
      font-style: italic;
      font-size: 0.85rem;
      text-align: center;
      margin-top: 40px;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2d3148; border-radius: 3px; }

    /* Responsive: stack panels on small screens */
    @media (max-width: 640px) {
      main { flex-direction: column; }
      #transcript-panel { width: 100%; border-top: 1px solid #2d3148; }
      #notes-panel { border-right: none; }
    }
  </style>
</head>
<body>

<header>
  <div id="status-dot"></div>
  <h1>Lecture Live</h1>
  <span id="status-label">Connecting…</span>
</header>

<main>
  <!-- Whiteboard notes -->
  <section id="notes-panel">
    <div class="panel-header">Whiteboard Notes</div>
    <div class="panel-body" id="notes-body">
      <div id="notes-content"></div>
      <p id="empty-notes">Waiting for whiteboard content…</p>
    </div>
  </section>

  <!-- Live transcript -->
  <section id="transcript-panel">
    <div class="panel-header">Live Transcript</div>
    <div class="panel-body" id="transcript-body">
      <div id="transcript-content"></div>
      <p id="empty-transcript">Waiting for audio…</p>
    </div>
  </section>
</main>

<script>
  // ---- DOM refs ----
  const statusDot   = document.getElementById('status-dot');
  const statusLabel = document.getElementById('status-label');
  const notesContent    = document.getElementById('notes-content');
  const emptyNotes      = document.getElementById('empty-notes');
  const transcriptContent = document.getElementById('transcript-content');
  const emptyTranscript   = document.getElementById('empty-transcript');
  const notesBody       = document.getElementById('notes-body');
  const transcriptBody  = document.getElementById('transcript-body');

  // ---- WebSocket ----
  const WS_URL = `ws://${location.host}/ws`;
  let socket;
  let reconnectDelay = 2000;

  function connect() {
    socket = new WebSocket(WS_URL);

    socket.addEventListener('open', () => {
      statusDot.classList.add('live');
      statusLabel.textContent = 'Live';
      reconnectDelay = 2000;
    });

    socket.addEventListener('close', () => {
      statusDot.classList.remove('live');
      statusLabel.textContent = `Reconnecting in ${reconnectDelay / 1000}s…`;
      setTimeout(connect, reconnectDelay);
      reconnectDelay = Math.min(reconnectDelay * 1.5, 15000);
    });

    socket.addEventListener('error', () => {
      socket.close();
    });

    socket.addEventListener('message', (event) => {
      let msg;
      try { msg = JSON.parse(event.data); } catch { return; }

      if (msg.type === 'whiteboard') {
        handleWhiteboard(msg);
      } else if (msg.type === 'transcript') {
        handleTranscript(msg);
      }
    });
  }

  // ---- Whiteboard handler ----
  function handleWhiteboard({ full, delta }) {
    if (!full && !delta) return;
    const md = full || delta;
    notesContent.innerHTML = marked.parse(md);
    renderMathInElement(notesContent, {
      delimiters: [
        { left: '$$', right: '$$', display: true  },
        { left: '$',  right: '$',  display: false }
      ],
      throwOnError: false
    });
    emptyNotes.style.display = 'none';
    notesBody.scrollTop = notesBody.scrollHeight;
  }

  // ---- Transcript handler ----
  function handleTranscript({ full, delta }) {
    if (!full && !delta) return;

    // If we receive the full transcript on connect, render all at once
    if (full && !delta) {
      transcriptContent.innerHTML = '';
      if (full.trim()) {
        appendSegment(full, false);
        emptyTranscript.style.display = 'none';
      }
      return;
    }

    // Incremental delta
    if (delta && delta.trim()) {
      appendSegment(delta, true);
      emptyTranscript.style.display = 'none';
      transcriptBody.scrollTop = transcriptBody.scrollHeight;
    }
  }

  function appendSegment(text, isNew) {
    const div = document.createElement('div');
    div.className = 'transcript-segment' + (isNew ? ' new' : '');
    div.textContent = text;
    transcriptContent.appendChild(div);
    // Remove "new" highlight after a moment
    if (isNew) {
      setTimeout(() => div.classList.remove('new'), 3000);
    }
  }

  // ---- Keepalive ping every 20s ----
  setInterval(() => {
    if (socket && socket.readyState === WebSocket.OPEN) {
      socket.send('ping');
    }
  }, 20000);

  // ---- Start ----
  connect();
</script>

</body>
</html>
